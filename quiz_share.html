<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quick Quiz — Nomenclature &amp; Isomerism of Organic Compounds</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --ink:#1f2937;
  --paper:#faf6ee;
  --chain:#2b6e63;
  --chain-dark:#184d44;
  --branch:#c1622d;
  --branch-light:#f2e1d2;
  --func:#7b4fa0;
  --line:#e1d7c3;
  --card:#ffffff;
}
*{box-sizing:border-box;}
body{
  margin:0; min-height:100vh;
  background:var(--paper); color:var(--ink);
  font-family:'Noto Sans Malayalam','Manjari',system-ui,sans-serif;
  line-height:1.55;
  display:flex; align-items:flex-start; justify-content:center;
}
.wrap{ max-width:520px; width:100%; padding:20px 14px 60px; }
header{
  background:linear-gradient(135deg,var(--chain-dark),var(--chain) 65%);
  color:#fff; padding:20px; border-radius:14px; text-align:center; margin-bottom:16px;
}
header h1{ margin:0 0 4px; font-size:1.15rem; }
header p{ margin:0; opacity:.85; font-size:.85rem; }
.card{
  background:var(--card); border:1px solid var(--line); border-radius:14px;
  padding:20px; box-shadow:0 2px 10px rgba(31,41,55,.05); margin-bottom:14px;
}
input[type=text]{
  width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:9px;
  font-size:1rem; font-family:inherit; margin:8px 0 16px;
}
label{ font-size:.88rem; color:#555; }
.btn{
  background:var(--branch); color:#fff; border:none; padding:11px 18px;
  border-radius:9px; cursor:pointer; font-family:inherit; font-weight:600;
  font-size:.95rem; width:100%;
}
.btn.secondary{ background:var(--chain); }
.btn:disabled{ opacity:.5; cursor:default; }
.progress{
  font-size:.85rem; color:#666; margin-bottom:10px; text-align:center;
}
.quiz-opts button{
  display:block; width:100%; text-align:left; margin:6px 0; padding:10px 14px;
  border:1px solid var(--line); background:#fff; border-radius:9px; cursor:pointer;
  font-family:inherit; font-size:.92rem;
}
.quiz-opts button.correct{ background:#dff3e8; border-color:var(--chain); font-weight:600; }
.quiz-opts button.wrong{ background:#fbe4e0; border-color:var(--branch); }
.quiz-opts button[disabled]{ cursor:default; }
.nav-row{ display:flex; gap:10px; margin-top:14px; }
.hidden{ display:none !important; }
.result-score{
  font-size:2.2rem; font-weight:700; color:var(--chain-dark); text-align:center; margin:6px 0;
}
.result-sub{ text-align:center; color:#666; font-size:.9rem; margin-bottom:16px; }
.status-msg{
  text-align:center; font-size:.85rem; padding:8px; border-radius:8px; margin-bottom:12px;
}
.status-msg.ok{ background:#dff3e8; color:var(--chain-dark); }
.status-msg.err{ background:#fbe4e0; color:var(--branch); }
footer.note{ text-align:center; font-size:.75rem; color:#8a8067; margin-top:20px; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Quick Quiz</h1>
    <p>Nomenclature &amp; Isomerism of Organic Compounds · Abacus Academy</p>
  </header>

  <!-- STEP 1: name entry -->
  <div class="card" id="nameScreen">
    <label for="studentName">Enter your name</label>
    <input type="text" id="studentName" placeholder="e.g. Arjun S">
    <button class="btn" onclick="startQuiz()">Start Quiz →</button>
  </div>

  <!-- STEP 2: quiz -->
  <div class="card hidden" id="quizScreen">
    <div class="progress">Question <b id="qPos">1</b> / <span id="qTotal">10</span></div>
    <div id="quizContainer"></div>
    <div class="nav-row">
      <button class="btn secondary" id="nextBtn" onclick="nextQuestion()">Next →</button>
    </div>
  </div>

  <!-- STEP 3: result -->
  <div class="card hidden" id="resultScreen">
    <p class="result-sub">Your Score</p>
    <div class="result-score"><span id="finalScore">0</span> / <span id="finalTotal">10</span></div>
    <p class="result-sub" style="margin-top:-8px;">👇 Tap this button to send your score to your teacher on WhatsApp</p>
    <div id="submitStatus"></div>
    <button class="btn" onclick="shareResult()">🔗 Share Score</button>
  </div>

  <footer class="note">Abacus Academy · Class 10 Chemistry</footer>
</div>

<script>
/* =====================================================================
   SUPABASE SETUP — REPLACE THESE TWO VALUES BEFORE PUBLISHING THE PAGE
   1. Go to your Supabase project → Settings → API
   2. Copy the "Project URL" and the "anon public" key below
   ===================================================================== */
const SUPABASE_URL = "https://YOUR-PROJECT-REF.supabase.co";
const SUPABASE_ANON_KEY = "YOUR-ANON-PUBLIC-KEY";
const QUIZ_NAME = "organic-nomenclature-isomerism";
/* ===================================================================== */

const quizData = [
  { q:"CH₃–CH₂–CH₂–CH₂–CH₃ എന്ന സംയുക്തത്തിന്റെ IUPAC നാമം?", opts:["ബ്യൂട്ടെയ്ൻ","പെന്റെയ്ൻ","ഹെക്സെയ്ൻ","പ്രൊപ്പെയ്ൻ"], ans:1 },
  { q:"–OH ഫങ്ഷണൽ ഗ്രൂപ്പുള്ള സംയുക്തങ്ങളെ എന്ത് പേരിൽ അറിയപ്പെടുന്നു?", opts:["ആൽഡിഹൈഡ്","കീറ്റോൺ","ആൽക്കഹോൾ","ഈഥർ"], ans:2 },
  { q:"CH₂=CH–CH₂–CH₃ എന്ന സംയുക്തത്തിന്റെ IUPAC നാമം?", opts:["ബ്യൂട്ട്–2–ഈൻ","ബ്യൂട്ട്–1–ഈൻ","ബ്യൂട്ട്–1–ഐൻ","പ്രൊപ്പീൻ"], ans:1 },
  { q:"ത്രിബന്ധനമുള്ള ഹൈഡ്രോകാർബണുകളുടെ പിൻപ്രത്യയം ഏത്?", opts:["–ol","–ene","–yne","–al"], ans:2 },
  { q:"CH₃COOH ന്റെ പൊതു നാമം?", opts:["ആൽഡിഹൈഡ്","കാർബോക്സിലിക് ആസിഡ്","കീറ്റോൺ","ഈഥർ"], ans:1 },
  { q:"CH₃CH₂OH ഉം CH₃OCH₃ ഉം തമ്മിൽ ഏത് തരം ഐസോമെറിസം?", opts:["ചെയിൻ ഐസോമെറിസം","പൊസിഷൻ ഐസോമെറിസം","ഫങ്ഷണൽ ഐസോമെറിസം","മെറ്റാമെറിസം"], ans:2 },
  { q:"CH₃CH₂CH₂OH, CH₃CH(OH)CH₃ ഇവ ഏത് തരം ഐസോമെറിസം പ്രദർശിപ്പിക്കുന്നു?", opts:["ചെയിൻ ഐസോമെറിസം","പൊസിഷൻ ഐസോമെറിസം","ഫങ്ഷണൽ ഐസോമെറിസം","മെറ്റാമെറിസം"], ans:1 },
  { q:">C=O ഫങ്ഷണൽ ഗ്രൂപ്പുള്ള സംയുക്തങ്ങൾ ഏതെല്ലാം?", opts:["ആൽക്കഹോളുകൾ","കീറ്റോണുകൾ","ഈഥറുകൾ","ഹാലോ സംയുക്തങ്ങൾ"], ans:1 },
  { q:"CH₃–O–CH₂–CH₃ ഏത് ഫങ്ഷണൽ ഗ്രൂപ്പ് കുടുംബത്തിൽപ്പെടുന്നു?", opts:["ആൽഡിഹൈഡ്","കീറ്റോൺ","ഈഥർ","കാർബോക്സിലിക് ആസിഡ്"], ans:2 },
  { q:"ഒരേ തന്മാത്രാസൂത്രവും ഒരേ ഫങ്ഷണൽ ഗ്രൂപ്പും ഇരുവശവുമുള്ള ആൽക്കൈൽ ഗ്രൂപ്പ് വ്യത്യാസവുമുള്ള ഐസോമെറിസം ഏത്?", opts:["ചെയിൻ ഐസോമെറിസം","ഫങ്ഷണൽ ഐസോമെറിസം","മെറ്റാമെറിസം","പൊസിഷൻ ഐസോമെറിസം"], ans:2 }
];

let studentName = "";
let currentQ = 0;
let score = 0;

function startQuiz(){
  const nameInput = document.getElementById('studentName');
  const val = nameInput.value.trim();
  if(!val){ nameInput.style.borderColor = 'var(--branch)'; nameInput.focus(); return; }
  studentName = val;
  document.getElementById('nameScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('qTotal').textContent = quizData.length;
  renderQuestion();
}

function renderQuestion(){
  document.getElementById('qPos').textContent = currentQ + 1;
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  const item = quizData[currentQ];
  const qDiv = document.createElement('div');
  qDiv.innerHTML = `<p><b>${currentQ+1}.</b> ${item.q}</p><div class="quiz-opts"></div>`;
  const optsDiv = qDiv.querySelector('.quiz-opts');
  item.opts.forEach((opt, oIdx)=>{
    const b = document.createElement('button');
    b.textContent = opt;
    b.addEventListener('click', ()=>{
      if(b.disabled) return;
      const allBtns = optsDiv.querySelectorAll('button');
      allBtns.forEach(x=>x.disabled=true);
      if(oIdx === item.ans){ b.classList.add('correct'); score++; }
      else { b.classList.add('wrong'); allBtns[item.ans].classList.add('correct'); }
      document.getElementById('nextBtn').disabled = false;
    });
    optsDiv.appendChild(b);
  });
  container.appendChild(qDiv);
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('nextBtn').textContent = (currentQ === quizData.length - 1) ? 'See Result →' : 'Next →';
}

function nextQuestion(){
  if(currentQ < quizData.length - 1){
    currentQ++;
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz(){
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalTotal').textContent = quizData.length;
  submitResult();
}

async function submitResult(){
  const statusDiv = document.getElementById('submitStatus');
  if(SUPABASE_URL.includes('YOUR-PROJECT-REF')){
    // Supabase not set up — quiz still works, score just isn't auto-saved.
    // Nothing shown here; the share button lets students send their score manually.
    return;
  }
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/quiz_scores`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        student_name: studentName,
        score: score,
        total: quizData.length,
        quiz_name: QUIZ_NAME
      })
    });
    if(res.ok){
      statusDiv.innerHTML = '<p class="status-msg ok">✅ Score saved</p>';
    } else {
      statusDiv.innerHTML = '<p class="status-msg err">⚠️ Could not save score</p>';
    }
  } catch(e){
    statusDiv.innerHTML = '<p class="status-msg err">⚠️ Please check your internet connection</p>';
  }
}

function shareResult(){
  const text = `Quick Quiz — Nomenclature & Isomerism of Organic Compounds\n${studentName}'s score: ${score} / ${quizData.length}`;
  if(navigator.share){
    navigator.share({ title: 'Quick Quiz Score', text: text }).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=> alert('Score copied!'));
  } else {
    alert(text);
  }
}
</script>
</body>
</html>
